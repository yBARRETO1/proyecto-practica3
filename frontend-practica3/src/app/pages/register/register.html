<div class="auth-container">

  <!-- VIDEO DE FONDO -->
  <video 
    autoplay 
    muted 
    loop 
    playsinline 
    preload="auto"
    class="video-bg"
  >
    <source src="background.mp4" type="video/mp4">
  </video>

  <!-- CARD -->
  <div class="auth-card">

    <h2>Crear cuenta</h2>
    <p class="subtitle">Regístrate para comenzar</p>

    <form>

      <!-- NOMBRE -->
      <div class="input-group">
        <span class="icon">👤</span>
        <input 
          type="text"
          name="nombre"
          [(ngModel)]="nombre_completo"
          placeholder="Nombre completo"
          required>
      </div>

      <!-- CORREO -->
      <div class="input-group">
        <span class="icon">📧</span>
        <input 
          type="email"
          name="correo"
          [(ngModel)]="correo"
          placeholder="Correo electrónico"
          required>
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <span class="icon">🔒</span>
        <input 
          type="password"
          name="contrasena"
          [(ngModel)]="contrasena"
          placeholder="Contraseña"
          required>
      </div>

      <!-- COMPAÑÍA -->
      <div class="input-group">
        <span class="icon">🏢</span>
        <select 
          name="compania"
          [(ngModel)]="compania_id"
          (change)="onCompaniaChange()"
        >
          <option [ngValue]="null">Seleccione compañía</option>

          <option *ngFor="let c of companias" [ngValue]="c.id">
            {{c.nombre}}
          </option>

          <option value="crear">➕ Crear nueva compañía</option>
        </select>
      </div>

      <!-- CREAR COMPAÑÍA -->
      <div *ngIf="crearCompaniaModo">

        <div class="input-group">
          <span class="icon">✏️</span>
          <input 
            type="text"
            [(ngModel)]="nuevaCompania"
            name="nuevaCompania"
            placeholder="Nombre nueva compañía">
        </div>

        <button type="button" class="secondary" (click)="crearCompania()">
          Guardar compañía
        </button>

      </div>

      <!-- BOTÓN -->
      <button type="button" (click)="registrar()">
        Crear cuenta
      </button>

    </form>

    <!-- LINK LOGIN -->
    <div class="link">
      ¿Ya tienes cuenta?
      <a routerLink="/">Inicia sesión</a>
    </div>

  </div>

</div>
