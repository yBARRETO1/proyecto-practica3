<div class="auth-container">

  <div class="auth-card">

    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="login()">

      <input
      type="email"
      [(ngModel)]="correo"
      name="correo"
      placeholder="Correo"
      required>

      <input
      type="password"
      [(ngModel)]="contrasena"
      name="contrasena"
      placeholder="Contraseña"
      required>

      <button type="submit">
        Ingresar
      </button>

    </form>

    <div class="link">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate</a>
    </div>

    <div *ngIf="mensaje" class="mensaje-exito">
      {{mensaje}}
    </div>

  </div>

</div>
